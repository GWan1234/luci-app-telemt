name: Build and Release OpenWrt Packages

on:
  push:
    tags:
      - 'v*' # Triggers only on tag creation (e.g., v3.3.10)
  workflow_dispatch:

# IMPORTANT: Allow the action to write to the repository to create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build IPK and APK
        run: |
          nfpm pkg --packager ipk
          nfpm pkg --packager apk

      # Upload artifacts to preserve build history
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telemt-packages
          path: |
            *.ipk
            *.apk

      # MAGIC HAPPENS HERE: Create a release and attach the files
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # Failsafe: only create release if triggered by a tag
        with:
          files: |
            *.ipk
            *.apk
          generate_release_notes: true # Automatically append commit history to release notes
